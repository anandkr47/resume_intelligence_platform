# Promtail configuration for log collection

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'logstream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

  # Application logs from files
  - job_name: api-gateway
    static_configs:
      - targets:
          - localhost
        labels:
          job: api-gateway
          service: api-gateway
          __path__: /var/log/api-gateway/*.log

  - job_name: analytics-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: analytics-api
          service: analytics-api
          __path__: /var/log/analytics-api/*.log

  - job_name: upload-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: upload-service
          service: upload-service
          __path__: /var/log/upload-service/*.log

  # Worker logs
  - job_name: workers
    static_configs:
      - targets:
          - localhost
        labels:
          job: workers
          __path__: /var/log/workers/*.log

  # System logs
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/syslog
