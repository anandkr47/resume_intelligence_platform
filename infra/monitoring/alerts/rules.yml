# Prometheus alerting rules for Resume Intelligence Platform

groups:
  - name: service_health
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up{job=~"api-gateway|analytics-api|upload-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} has been down for more than 1 minute"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate in {{ $labels.job }}"
          description: "Error rate is above 5% for {{ $labels.job }}"

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time in {{ $labels.job }}"
          description: "95th percentile response time is above 2s for {{ $labels.job }}"

  - name: infrastructure
    interval: 30s
    rules:
      - alert: DatabaseConnectionHigh
        expr: pg_stat_database_numbackends / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High database connection usage"
          description: "Database connections are above 80% of maximum"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Redis memory usage"
          description: "Redis memory usage is above 90%"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk space is below 10% on {{ $labels.instance }}"

  - name: queue_health
    interval: 30s
    rules:
      - alert: QueueBacklogHigh
        expr: bullmq_queue_waiting_count > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High queue backlog in {{ $labels.queue }}"
          description: "Queue {{ $labels.queue }} has more than 1000 waiting jobs"

      - alert: QueueFailedJobs
        expr: rate(bullmq_queue_failed_count[5m]) > 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High failed job rate in {{ $labels.queue }}"
          description: "Queue {{ $labels.queue }} has more than 10 failed jobs per minute"
