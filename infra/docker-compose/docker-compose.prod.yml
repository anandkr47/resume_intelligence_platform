version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway-node:
    build:
      context: ../..
      dockerfile: apps/api-gateway-node/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - UPLOAD_SERVICE_URL=http://upload-service-node:3001
      - ANALYTICS_API_URL=http://analytics-api-node:3002
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    depends_on:
      - postgres
      - redis

  upload-service-node:
    build:
      context: ../..
      dockerfile: apps/upload-service-node/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    volumes:
      - uploads_data:/app/uploads
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    depends_on:
      - postgres
      - redis

  analytics-api-node:
    build:
      context: ../..
      dockerfile: apps/analytics-api-node/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - POSTGRES_HOST=postgres
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    depends_on:
      - postgres

  ocr-worker-python:
    build:
      context: ../..
      dockerfile: apps/ocr-worker-python/Dockerfile
    environment:
      - REDIS_HOST=redis
      - TESSERACT_LANG=eng
    deploy:
      replicas: 5
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    depends_on:
      - redis

  parser-worker-python:
    build:
      context: ../..
      dockerfile: apps/parser-worker-python/Dockerfile
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    deploy:
      replicas: 5
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    depends_on:
      - postgres
      - redis

  matcher-worker-node:
    build:
      context: ../..
      dockerfile: apps/matcher-worker-node/Dockerfile
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    deploy:
      replicas: 5
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    depends_on:
      - postgres
      - redis

  insights-worker-python:
    build:
      context: ../..
      dockerfile: apps/insights-worker-python/Dockerfile
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    depends_on:
      - postgres
      - redis

  export-worker-node:
    build:
      context: ../..
      dockerfile: apps/export-worker-node/Dockerfile
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    volumes:
      - exports_data:/app/exports
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    depends_on:
      - postgres
      - redis

  frontend-dashboard:
    build:
      context: ../..
      dockerfile: apps/frontend-dashboard/Dockerfile
    ports:
      - "80:80"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    depends_on:
      - api-gateway-node

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  exports_data:

networks:
  default:
    name: resume-platform-network
