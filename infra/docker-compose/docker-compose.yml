version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resume_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resume_password}
      POSTGRES_DB: ${POSTGRES_DB:-resume_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resume_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ../redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway-node:
    build:
      context: ../..
      dockerfile: apps/api-gateway-node/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - UPLOAD_SERVICE_URL=http://upload-service-node:3001
      - ANALYTICS_API_URL=http://analytics-api-node:3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  upload-service-node:
    build:
      context: ../..
      dockerfile: apps/upload-service-node/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  analytics-api-node:
    build:
      context: ../..
      dockerfile: apps/analytics-api-node/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - POSTGRES_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy

  ocr-worker-python:
    build:
      context: ../..
      dockerfile: apps/ocr-worker-python/Dockerfile
    environment:
      - REDIS_HOST=redis
      - TESSERACT_LANG=eng
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

  parser-worker-python:
    build:
      context: ../..
      dockerfile: apps/parser-worker-python/Dockerfile
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

  matcher-worker-node:
    build:
      context: ../..
      dockerfile: apps/matcher-worker-node/Dockerfile
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

  insights-worker-python:
    build:
      context: ../..
      dockerfile: apps/insights-worker-python/Dockerfile
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1

  export-worker-node:
    build:
      context: ../..
      dockerfile: apps/export-worker-node/Dockerfile
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    volumes:
      - exports_data:/app/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1

  frontend-dashboard:
    build:
      context: ../..
      dockerfile: apps/frontend-dashboard/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api-gateway-node

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  exports_data:

networks:
  default:
    name: resume-platform-network
