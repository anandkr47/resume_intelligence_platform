services:
  api-gateway:
    build:
      context: ../..
      dockerfile: apps/api-gateway-node/Dockerfile
    image: api-gateway:latest
    ports:
      - "3000:3000"
    env_file: ../../.env
    environment:
      - UPLOAD_SERVICE_URL=http://upload-service:3001
      - ANALYTICS_API_URL=http://analytics-api:3002
    networks:
      - resume-platform
    depends_on:
      - analytics-api
      - upload-service
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  analytics-api:
    build:
      context: ../..
      dockerfile: apps/analytics-api-node/Dockerfile
    image: analytics-api-node:latest
    ports:
      - "3002:3002"
    env_file: ../../.env
    networks:
      - resume-platform
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3

  upload-service:
    build:
      context: ../..
      dockerfile: apps/upload-service-node/Dockerfile
    image: upload-service-node:latest
    ports:
      - "3001:3001"
    env_file: ../../.env
    environment:
      - DB_POOL_MAX=50
      - UPLOAD_MAX_CONCURRENT=0
    volumes:
      - uploads:/app/uploads
    networks:
      - resume-platform
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3

  matcher-worker:
    build:
      context: ../..
      dockerfile: apps/matcher-worker-node/Dockerfile
    image: matcher-worker-node:latest
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=resume_platform
    networks:
      - resume-platform
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

  export-worker:
    build:
      context: ../..
      dockerfile: apps/export-worker-node/Dockerfile
    image: export-worker-node:latest
    env_file: ../../.env
    volumes:
      - exports:/app/exports
    networks:
      - resume-platform
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 1

  ocr-worker:
    build:
      context: ../..
      dockerfile: apps/ocr-worker-python/Dockerfile
    image: ocr-worker-python:latest
    env_file: ../../.env
    volumes:
      - uploads:/app/uploads
    networks:
      - resume-platform
    depends_on:
      - redis
    deploy:
      replicas: 2

  parser-worker:
    build:
      context: ../..
      dockerfile: apps/parser-worker-python/Dockerfile
    image: parser-worker-python:latest
    env_file: ../../.env
    networks:
      - resume-platform
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

  insights-worker:
    build:
      context: ../..
      dockerfile: apps/insights-worker-python/Dockerfile
    image: insights-worker-python:latest
    env_file: ../../.env
    networks:
      - resume-platform
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 1

  frontend-dashboard:
    build:
      context: ../..
      dockerfile: apps/frontend-dashboard/Dockerfile
    image: frontend-dashboard:latest
    ports:
      - "80:80"
    env_file: ../../.env
    networks:
      - resume-platform
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=resume_platform
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - resume-platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - resume-platform
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

networks:
  resume-platform:
    name: resume-platform
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads:
  exports:
