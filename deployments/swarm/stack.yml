version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-resume_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Gateway: scale with upload load; forwards to upload-service-node (Swarm load-balances)
  api-gateway-node:
    image: resume-platform/api-gateway:latest
    ports:
      - "3000:3000"
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - UPLOAD_SERVICE_URL=${UPLOAD_SERVICE_URL:-http://upload-service-node:3001}
      - ANALYTICS_API_URL=${ANALYTICS_API_URL:-http://analytics-api-node:3002}
    networks:
      - backend
      - frontend
    labels:
      - "com.resume-platform.component=gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # Upload service: scale replicas for capacity (use load test to find target RPS per replica)
  upload-service-node:
    image: resume-platform/upload-service:latest
    ports:
      - "3001:3001"
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      # Per-replica capacity: DB pool and concurrent upload cap (0 = no limit)
      - DB_POOL_MAX=${DB_POOL_MAX:-20}
      - UPLOAD_MAX_CONCURRENT=${UPLOAD_MAX_CONCURRENT:-50}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - backend
    labels:
      - "com.resume-platform.component=upload"
      - "com.resume-platform.scale-pool=upload"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  analytics-api-node:
    image: resume-platform/analytics-api:latest
    ports:
      - "3002:3002"
    environment:
      - POSTGRES_HOST=postgres
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3002/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M

  ocr-worker-python:
    image: resume-platform/ocr-worker:latest
    environment:
      - REDIS_HOST=redis
      - TESSERACT_LANG=eng
    networks:
      - backend
    deploy:
      replicas: 5
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          cpus: '2'
          memory: 2G

  parser-worker-python:
    image: resume-platform/parser-worker:latest
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    networks:
      - backend
    deploy:
      replicas: 5
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          cpus: '1'
          memory: 1G

  matcher-worker-node:
    image: resume-platform/matcher-worker:latest
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    networks:
      - backend
    deploy:
      replicas: 5
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          cpus: '1'
          memory: 1G

  insights-worker-python:
    image: resume-platform/insights-worker:latest
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    networks:
      - backend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          cpus: '1'
          memory: 1G

  export-worker-node:
    image: resume-platform/export-worker:latest
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    volumes:
      - exports_data:/app/exports
    networks:
      - backend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          cpus: '1'
          memory: 512M

  frontend-dashboard:
    image: resume-platform/frontend:latest
    ports:
      - "80:80"
    networks:
      - frontend
    environment:
      - API_GATEWAY_URL=${API_GATEWAY_URL}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  exports_data:

networks:
  backend:
  frontend:
