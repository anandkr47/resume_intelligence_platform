apiVersion: apps/v1
kind: Deployment
metadata:
  name: matcher-worker
  labels:
    app: matcher-worker
    service: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: matcher-worker
  template:
    metadata:
      labels:
        app: matcher-worker
    spec:
      containers:
      - name: matcher-worker
        image: matcher-worker-node:latest
        imagePullPolicy: Always
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: export-worker
  labels:
    app: export-worker
    service: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: export-worker
  template:
    metadata:
      labels:
        app: export-worker
    spec:
      containers:
      - name: export-worker
        image: export-worker-node:latest
        imagePullPolicy: Always
        env:
        - name: NODE_ENV
          value: "production"
        volumeMounts:
        - name: exports
          mountPath: /app/exports
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
      volumes:
      - name: exports
        persistentVolumeClaim:
          claimName: exports-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-worker
  labels:
    app: ocr-worker
    service: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ocr-worker
  template:
    metadata:
      labels:
        app: ocr-worker
    spec:
      containers:
      - name: ocr-worker
        image: ocr-worker-python:latest
        imagePullPolicy: Always
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "2000m"
---
